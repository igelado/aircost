<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AirCost</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main>
    <section id="setup-view" class="view">
      <h1>AirCost</h1>
      <label>
        Server
        <input id="server-url" type="url" value="http://127.0.0.1:8001">
      </label>
      <label>
        Username
        <input id="username" type="text" value="developer">
      </label>
      <button id="register-button" type="button">Register</button>
    </section>

    <section id="capture-view" class="view hidden">
      <header>
        <h1>AirCost</h1>
        <div class="header-actions">
          <button id="refresh-status-button" class="icon-button" type="button" aria-label="Refresh listing status" title="Refresh listing status">R</button>
          <button id="reset-button" class="ghost-button" type="button">Reset</button>
        </div>
      </header>

      <dl class="config-list">
        <dt>Server</dt>
        <dd id="configured-server"></dd>
        <dt>User</dt>
        <dd id="configured-user"></dd>
        <dt>Install</dt>
        <dd id="configured-install"></dd>
      </dl>

      <section class="panel">
        <div class="status-row">
          <span id="submission-badge" class="status-pill is-unknown">Checking</span>
          <button id="submit-button" type="button">Submit Page</button>
        </div>
        <div id="current-url" class="current-url"></div>
      </section>

      <ol id="progress-list" class="progress-list" aria-live="polite"></ol>

      <section id="listing-editor" class="panel hidden">
        <div class="section-heading">
          <h2>Listing</h2>
          <span id="listing-id-label"></span>
        </div>
        <form id="listing-editor-form">
          <div class="form-grid">
            <label>
              Manufacturer
              <input name="manufacturer" required autocomplete="off">
            </label>
            <label>
              Model
              <input name="model" required autocomplete="off">
            </label>
            <label>
              Variant
              <input name="variant" required autocomplete="off">
            </label>
            <label>
              Year
              <input name="model_year" type="number" min="1900" max="2039" step="1" required>
            </label>
            <label>
              Ask
              <input name="asking_price_usd" type="number" min="0" step="1000" required>
            </label>
            <label>
              Currency
              <input name="currency" maxlength="3" required>
            </label>
            <label>
              Status
              <select name="status">
                <option value="active">Active</option>
                <option value="pending">Pending</option>
                <option value="sold">Sold</option>
                <option value="unknown">Unknown</option>
              </select>
            </label>
            <label>
              Tail
              <input name="registration_number" autocomplete="off">
            </label>
            <label>
              Serial
              <input name="serial_number" autocomplete="off">
            </label>
            <label>
              Airframe h
              <input name="airframe_hours" type="number" min="0" step="0.1" required>
            </label>
            <label>
              Engine h
              <input name="engine_hours" type="number" min="0" step="0.1" required>
            </label>
            <label>
              Prop h
              <input name="propeller_hours" type="number" min="0" step="0.1" required>
            </label>
          </div>

          <fieldset class="avionics-fieldset">
            <div class="fieldset-heading">
              <span>Avionics</span>
              <button class="icon-button" id="add-avionics-button" type="button" aria-label="Add avionics" title="Add avionics">+</button>
            </div>
            <div id="avionics-list" class="avionics-list"></div>
          </fieldset>

          <button id="save-listing-button" type="submit">Save Listing</button>
        </form>
      </section>
    </section>

    <pre id="status"></pre>
  </main>
  <script src="popup.js"></script>
</body>
</html>
