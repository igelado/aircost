name: Test

on:
  pull_request:
  push:
    branches:
      - main
      - agent/**

jobs:
  test:
    name: test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: python -m pip install -e .

      - name: Run unit tests
        run: PYTHONDONTWRITEBYTECODE=1 python -m unittest
